name: Build for Windows, Linux and macOS

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: metube-windows-x64
            executable: metube-windows-x64.exe
            build_cmd: |
              move dist\main.exe output\metube-windows-x64.exe

          - os: ubuntu-latest
            artifact_name: metube-linux-x64
            executable: metube-linux-x64
            build_cmd: |
              mv dist/main output/metube-linux-x64
              chmod +x output/metube-linux-x64

          - os: macos-latest
            artifact_name: metube-macos-x64
            executable: metube-macos-x64
            build_cmd: |
              mv dist/main output/metube-macos-x64
              chmod +x output/metube-macos-x64

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # ---------- NODE.JS ----------
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install UI dependencies
      run: |
        cd ui
        npm install

    - name: Build UI
      run: |
        cd ui
        npm run build

    # ---------- PYTHON ----------
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    # ---------- BUILD UI.B64 ----------
    - name: Generate ui.b64
      run: python build_ui.py

    # ---------- BUILD EXECUTABLE ----------
    - name: Build executable
      run: |
        pyinstaller --onefile --hidden-import=engineio.async_drivers.aiohttp app/main.py
        mkdir output
        ${{ matrix.build_cmd }}

    # ---------- SUBIR Resultado ----------
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: output/${{ matrix.executable }}
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: output

    - name: Display structure of downloaded files
      run: ls -R output

    - name: Debug files before release
      run: find output -type f

    # ---------- CREAR RELEASE AUTOMÁTICA (DRAFT) ----------
    - name: Create Draft Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Metube ${{ github.ref_name }}
        body: |
          Metube with yt-dlp updated.
          Build created automatically with GitHub Actions.
        draft: false
        prerelease: true
        files: |
          output/metube-windows-x64/*
          output/metube-linux-x64/*
          output/metube-macos-x64/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
